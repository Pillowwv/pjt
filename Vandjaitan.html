<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Creative Studio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #020617;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

nav h1 {
    color: orange;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 50px;
}

.hero h2 {
    font-size: 50px;
    max-width: 600px;
}

/* SECTION */
.section {
    padding: 80px 50px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 30px;
}

/* CARD */
.card {
    background: #0f172a;
    border-radius: 20px;
    overflow: hidden;
    transform: translateY(50px);
    opacity: 0;
    transition: 0.6s;
}

.card.show {
    transform: translateY(0);
    opacity: 1;
}

.card img,
.card video {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* FOOTER */
footer {
    padding: 40px;
    text-align: center;
    color: #64748b;
}
</style>
</head>

<body>

<nav>
    <h1>OUR</h1>
    <span>Family Studio</span>
</nav>

<div class="hero">
    <h2>Kami menciptakan momen, bukan sekadar kenangan.</h2>
</div>

<div class="section">
    <h2>About</h2>
    <p style="max-width:600px;color:#94a3b8;margin-top:10px;">
        Sebuah keluarga besar dengan energi anak muda yang selalu menciptakan
        cerita baru dalam setiap pertemuan.
    </p>
</div>

<div class="section">
    <h2>Our Work</h2>

    <div class="grid">

        <div class="card">
            <img src="foto1.jpg">
        </div>

        <div class="card">
            <video muted loop>
                <source src="video1.mp4">
            </video>
        </div>

        <div class="card">
            <video muted loop>
                <source src="video2.mp4">
            </video>
        </div>

    </div>
</div>

<footer>
    © 2026 Our Family Studio
</footer>

<script>
// SCROLL ANIMATION
const cards = document.querySelectorAll(".card");

window.addEventListener("scroll", ()=>{
    cards.forEach(card=>{
        const top = card.getBoundingClientRect().top;
        if(top < window.innerHeight - 50){
            card.classList.add("show");
        }
    });
});

// VIDEO AUTO PLAY
document.querySelectorAll("video").forEach(v=>{
    v.addEventListener("mouseenter", ()=> v.play());
    v.addEventListener("mouseleave", ()=> v.pause());
});
</script>

</body>
</html>
